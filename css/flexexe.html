<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 92vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #container{
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(3,1fr);
        }
        .box{
            display: flex;
            height: 100px;
            width: 100px;
            border: 2px solid aqua;
            background:blue;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box">box</div>
        <div class="box">box</div>
        <div class="box">box</div>
        <div class="box">box</div>
        <div class="box">box</div>
    </div>
</body>
</html>
